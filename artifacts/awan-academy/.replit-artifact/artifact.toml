kind = "web"
previewPath = "/"
title = "The Awan Academy"
version = "1.0.0"
id = "artifacts/awan-academy"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25573

[services.development]
run = "pnpm --filter @workspace/awan-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/awan-academy", "run", "build" ]
serve = "static"
publicDir = "artifacts/awan-academy/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25573"
BASE_PATH = "/"
